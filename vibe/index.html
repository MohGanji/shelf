<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JXDFZEKF37"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JXDFZEKF37', { 'transport_type': 'beacon'});
    </script>
    <!-- End gtag.js -->
    
    <title>Vibe Projects</title>

    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <link rel="mask-icon" href="/assets/favicon/safari-pinned-tab.svg" color="#ececec">
    <meta name="msapplication-TileColor" content="#161616">
    <meta name="theme-color" content="#ececec">
    
    <link rel="stylesheet" href="../base.css">
    <style>
      .vibe-list {
        margin-top: 2rem;
      }

      .vibe-entry:not(:last-child) {
        margin-bottom: 1.5rem;
      }

      .vibe-entry-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        column-gap: 1rem;
        row-gap: 0.2rem;
        align-items: baseline;
      }

      .vibe-entry-title {
        grid-column: 1;
        grid-row: 1;
        font-size: medium;
        font-weight: 400;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .vibe-entry-date {
        grid-column: 2;
        grid-row: 1;
        font-size: medium;
        font-weight: 200;
        opacity: 0.75;
        white-space: nowrap;
        text-align: end;
        justify-self: end;
      }

      .vibe-entry-model {
        grid-column: 1 / -1;
        grid-row: 2;
        display: none;
        font-size: small;
        font-weight: 200;
        opacity: 0.75;
        line-height: 140%;
        overflow-wrap: anywhere;
      }

      .vibe-entry-model-inline {
        font-weight: 200;
        opacity: 0.75;
      }

      .vibe-entry-note {
        margin-top: 0.35rem;
        font-size: small;
        font-weight: 200;
        opacity: 0.7;
        line-height: 150%;
        overflow-wrap: anywhere;
      }

      .vibe-entry-note a {
        font-weight: 400;
      }

      @media screen and (max-width: 600px) {
        .vibe-list {
          margin-top: 1.25rem;
        }

        .vibe-entry:not(:last-child) {
          margin-bottom: 1.25rem;
        }

        .vibe-entry-header {
          row-gap: 0.15rem;
        }

        .vibe-entry-header:has(.vibe-entry-model) {
          grid-template-columns: minmax(0, 1fr) auto;
        }

        .vibe-entry-header:has(.vibe-entry-model) .vibe-entry-title {
          grid-column: 1 / -1;
          grid-row: 1;
        }

        .vibe-entry-header:has(.vibe-entry-model) .vibe-entry-date {
          grid-column: 2;
          grid-row: 2;
          font-size: small;
        }

        .vibe-entry-model-inline {
          display: none;
        }

        .vibe-entry-model {
          display: block;
          grid-column: 1;
          grid-row: 2;
          padding-right: 0.75rem;
        }

        .vibe-entry-date {
          font-size: small;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="description-container" class="subcontainer">
        <div class="item-title">Vibe Codings</div>
        <div class="item-description item-subtitle">
          <div id="vibe-list" class="vibe-list"></div>
        </div>
      </div>
      <a class="item-subtitle" href="/">Back to Shelf</a>
    </div>

    <script src="./projects.js"></script>
    <script>
      const list = document.getElementById("vibe-list");

      vibeProjects.forEach((project) => {
        if (project.hidden) return;

        const entry = document.createElement("div");
        entry.className = "vibe-entry";

        const header = document.createElement("div");
        header.className = "vibe-entry-header";

        const title = document.createElement("div");
        title.className = "vibe-entry-title";
        title.innerHTML = `<a href="${project.url}">${project.title}</a>${
          project.model
            ? `<span class="vibe-entry-model-inline"> (${project.model})</span>`
            : ""
        }`;

        const date = document.createElement("div");
        date.className = "vibe-entry-date";
        date.textContent = project.date;

        header.append(title, date);

        if (project.model) {
          const model = document.createElement("div");
          model.className = "vibe-entry-model";
          model.textContent = project.model;
          header.append(model);
        }

        const note = document.createElement("div");
        note.className = "vibe-entry-note";
        note.innerHTML = project.note;

        entry.append(header, note);
        list.append(entry);
      });
    </script>
  </body>
</html>

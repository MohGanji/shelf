<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globe</title>
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }

        .header {
            position: fixed; top: 20px; left: 24px; z-index: 10;
            display: flex; align-items: baseline; gap: 16px;
        }
        .header h1 {
            color: #e8e8e8; font-family: 'Inter', sans-serif;
            font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em;
        }
        .header a {
            color: #555; font-family: 'Inter', sans-serif;
            font-size: 0.8rem; text-decoration: none;
        }
        .header a:hover { color: #888; }

        .country-label {
            color: rgba(220,220,220,0.9);
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            pointer-events: none;
            text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        .country-name-tag {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 8px 18px;
            color: #4baea4; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            pointer-events: none; opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }
        .country-name-tag.visible { opacity: 1; }

        .loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-family: 'Inter', sans-serif; font-size: 0.85rem;
            z-index: 100; background: #000; transition: opacity 0.6s;
        }
        .loading.done { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Globe</h1>
        <a href="/vibe/">back</a>
    </div>
    <div class="country-name-tag" id="country-name-tag"></div>
    <div class="loading" id="loading">Loading globe data...</div>

    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const topoFn = window.topojson;

        // Country names by ISO 3166-1 numeric code
        const NAMES = {
            "004":"Afghanistan","008":"Albania","012":"Algeria","024":"Angola",
            "010":"Antarctica","032":"Argentina","051":"Armenia","036":"Australia",
            "040":"Austria","031":"Azerbaijan","044":"Bahamas","050":"Bangladesh",
            "112":"Belarus","056":"Belgium","084":"Belize","204":"Benin",
            "064":"Bhutan","068":"Bolivia","070":"Bosnia & Herz.","072":"Botswana",
            "076":"Brazil","096":"Brunei","100":"Bulgaria","854":"Burkina Faso",
            "108":"Burundi","116":"Cambodia","120":"Cameroon","124":"Canada",
            "140":"Central African Rep.","148":"Chad","152":"Chile","156":"China",
            "170":"Colombia","178":"Congo","180":"Dem. Rep. Congo","188":"Costa Rica",
            "384":"Ivory Coast","191":"Croatia","192":"Cuba","196":"Cyprus",
            "203":"Czechia","208":"Denmark","262":"Djibouti","214":"Dominican Rep.",
            "218":"Ecuador","818":"Egypt","222":"El Salvador","226":"Eq. Guinea",
            "232":"Eritrea","233":"Estonia","231":"Ethiopia","242":"Fiji",
            "246":"Finland","250":"France","266":"Gabon","270":"Gambia",
            "268":"Georgia","276":"Germany","288":"Ghana","300":"Greece",
            "304":"Greenland","320":"Guatemala","324":"Guinea","624":"Guinea-Bissau",
            "328":"Guyana","332":"Haiti","340":"Honduras","348":"Hungary",
            "352":"Iceland","356":"India","360":"Indonesia","364":"Iran",
            "368":"Iraq","372":"Ireland","376":"Israel","380":"Italy",
            "388":"Jamaica","392":"Japan","400":"Jordan","398":"Kazakhstan",
            "404":"Kenya","408":"N. Korea","410":"S. Korea","414":"Kuwait",
            "417":"Kyrgyzstan","418":"Laos","428":"Latvia","422":"Lebanon",
            "426":"Lesotho","430":"Liberia","434":"Libya","440":"Lithuania",
            "442":"Luxembourg","450":"Madagascar","454":"Malawi","458":"Malaysia",
            "466":"Mali","478":"Mauritania","484":"Mexico","498":"Moldova",
            "496":"Mongolia","499":"Montenegro","504":"Morocco","508":"Mozambique",
            "104":"Myanmar","516":"Namibia","524":"Nepal","528":"Netherlands",
            "540":"New Caledonia","554":"New Zealand","558":"Nicaragua","562":"Niger",
            "566":"Nigeria","578":"Norway","512":"Oman","586":"Pakistan",
            "275":"Palestine","591":"Panama","598":"Papua New Guinea","600":"Paraguay",
            "604":"Peru","608":"Philippines","616":"Poland","620":"Portugal",
            "630":"Puerto Rico","634":"Qatar","642":"Romania","643":"Russia",
            "646":"Rwanda","682":"Saudi Arabia","686":"Senegal","688":"Serbia",
            "694":"Sierra Leone","703":"Slovakia","705":"Slovenia","706":"Somalia",
            "710":"South Africa","728":"South Sudan","724":"Spain","144":"Sri Lanka",
            "729":"Sudan","740":"Suriname","748":"Eswatini","752":"Sweden",
            "756":"Switzerland","760":"Syria","158":"Taiwan","762":"Tajikistan",
            "834":"Tanzania","764":"Thailand","626":"Timor-Leste","768":"Togo",
            "780":"Trinidad & Tobago","788":"Tunisia","792":"Turkey",
            "795":"Turkmenistan","800":"Uganda","804":"Ukraine","784":"UAE",
            "826":"United Kingdom","840":"United States","858":"Uruguay",
            "860":"Uzbekistan","548":"Vanuatu","862":"Venezuela","704":"Vietnam",
            "887":"Yemen","894":"Zambia","716":"Zimbabwe",
            "807":"N. Macedonia","174":"Comoros","090":"Solomon Is."
        };

        // Constants
        const RADIUS = 100;
        const LABEL_SHOW_DIST = 220;
        const TEX_W = 4096;
        const TEX_H = 2048;
        const LAND_FILL = '#2a5a3a';
        const LAND_HOVER = '#4baea4';
        const BORDER_STROKE = '#4a8a5a';
        const BORDER_WIDTH = 1.5;

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera
        const camera = new THREE.PerspectiveCamera(
            45, window.innerWidth / window.innerHeight, 1, 2000
        );
        camera.position.set(0, 50, 280);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // CSS2D Renderer (labels)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 115;
        controls.maxDistance = 500;
        controls.enablePan = false;
        controls.rotateSpeed = 0.5;
        controls.zoomSpeed = 0.8;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(5, 3, 4);
        scene.add(dirLight);

        // === Ocean ===
        const oceanMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    vViewPos = mv.xyz;
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vec3 view = normalize(-vViewPos);
                    float f = 1.0 - max(dot(view, vNormal), 0.0);
                    f = pow(f, 2.8);
                    vec3 deep = vec3(0.008, 0.03, 0.09);
                    vec3 mid  = vec3(0.015, 0.06, 0.14);
                    vec3 rim  = vec3(0.04, 0.12, 0.24);
                    vec3 c = mix(deep, mid, 0.25 + f * 0.35);
                    c = mix(c, rim, f);
                    gl_FragColor = vec4(c, 1.0);
                }
            `
        });
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(RADIUS, 128, 128), oceanMat
        ));

        // === Atmosphere glow ===
        const atmosMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vViewPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vec3 v = normalize(-vViewPos);
                    float rim = 1.0 - max(dot(v, vNormal), 0.0);
                    rim = pow(rim, 4.0);
                    gl_FragColor = vec4(0.15, 0.4, 0.7, rim * 0.25);
                }
            `,
            transparent: true, side: THREE.BackSide, depthWrite: false
        });
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(RADIUS * 1.02, 64, 64), atmosMat
        ));

        // === Stars ===
        const starPos = new Float32Array(3000 * 3);
        for (let i = 0; i < 3000; i++) {
            const r = 700 + Math.random() * 500;
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            starPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
            starPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
            starPos[i*3+2] = r * Math.cos(ph);
        }
        const starGeom = new THREE.BufferGeometry();
        starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeom,
            new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true })
        ));

        // === Utilities ===
        function latLonToVec3(lat, lon, r) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }

        // ============================================================
        //  TEXTURE-BASED COUNTRY RENDERING
        //  Draw countries on a 2D canvas, wrap as texture on sphere.
        //  No triangulation — canvas 2D paths handle all polygon shapes.
        // ============================================================

        const colorCanvas = document.createElement('canvas');
        colorCanvas.width = TEX_W; colorCanvas.height = TEX_H;
        const colorCtx = colorCanvas.getContext('2d');

        const idCanvas = document.createElement('canvas');
        idCanvas.width = TEX_W; idCanvas.height = TEX_H;
        const idCtx = idCanvas.getContext('2d');

        const landTexture = new THREE.CanvasTexture(colorCanvas);
        landTexture.minFilter = THREE.LinearFilter;
        landTexture.magFilter = THREE.LinearFilter;

        // Land sphere sits just above the ocean
        const landSphere = new THREE.Mesh(
            new THREE.SphereGeometry(RADIUS + 0.3, 256, 128),
            new THREE.MeshStandardMaterial({
                map: landTexture,
                transparent: true,
                roughness: 0.85,
                metalness: 0.05,
                emissive: 0x0a1a10,
                emissiveIntensity: 0.3
            })
        );
        scene.add(landSphere);

        // Country data
        let features = [];
        let hoveredIdx = -1;
        const labels = [];

        // === Canvas drawing helpers ===

        function lonLatToPixel(lon, lat) {
            return [
                (lon + 180) / 360 * TEX_W,
                (90 - lat) / 180 * TEX_H
            ];
        }

        // Trace a polygon (outer ring + holes) onto canvas context
        function tracePolygon(ctx, polygon, crosses) {
            ctx.beginPath();
            for (let r = 0; r < polygon.length; r++) {
                const ring = polygon[r];
                for (let i = 0; i < ring.length; i++) {
                    let lon = ring[i][0];
                    if (crosses && lon < 0) lon += 360;
                    const [x, y] = lonLatToPixel(lon, ring[i][1]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
            }
        }

        function getPolygons(feature) {
            const type = feature.geometry.type;
            if (type === 'Polygon') return [feature.geometry.coordinates];
            if (type === 'MultiPolygon') return feature.geometry.coordinates;
            return [];
        }

        function doesCross(polygon) {
            // Detect actual antimeridian jumps (e.g. Russia: +170 → -170)
            // Skip the closure segment (last→first) — GeoJSON rings close
            // explicitly, so Antarctica's [-180..+180, back to -180] has a
            // 360° jump only at closure, not a real geographic crossing.
            const ring = polygon[0];
            for (let i = 1; i < ring.length - 1; i++) {
                if (Math.abs(ring[i][0] - ring[i - 1][0]) > 180) return true;
            }
            return false;
        }

        function drawFeature(ctx, feature, fillStyle, strokeStyle, lineWidth) {
            const polygons = getPolygons(feature);
            for (const polygon of polygons) {
                const crosses = doesCross(polygon);

                if (fillStyle) {
                    ctx.fillStyle = fillStyle;
                    tracePolygon(ctx, polygon, crosses);
                    ctx.fill('evenodd');
                    if (crosses) {
                        // Draw wrapped copy for the other side of the seam
                        ctx.save();
                        ctx.translate(-TEX_W, 0);
                        tracePolygon(ctx, polygon, crosses);
                        ctx.fill('evenodd');
                        ctx.restore();
                    }
                }
                if (strokeStyle) {
                    ctx.strokeStyle = strokeStyle;
                    ctx.lineWidth = lineWidth || 1;
                    tracePolygon(ctx, polygon, crosses);
                    ctx.stroke();
                    if (crosses) {
                        ctx.save();
                        ctx.translate(-TEX_W, 0);
                        tracePolygon(ctx, polygon, crosses);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        function redrawColorCanvas(hoverIdx) {
            colorCtx.clearRect(0, 0, TEX_W, TEX_H);

            // Fill all countries
            for (let i = 0; i < features.length; i++) {
                const fill = (i === hoverIdx) ? LAND_HOVER : LAND_FILL;
                drawFeature(colorCtx, features[i], fill, null);
            }
            // Draw borders on top of all fills
            for (let i = 0; i < features.length; i++) {
                drawFeature(colorCtx, features[i], null, BORDER_STROKE, BORDER_WIDTH);
            }

            // South pole ice cap — fill only transparent pixels in the polar region
            // Use 'destination-over' so it draws behind existing content
            // Gradient fade from transparent → white for a soft edge
            colorCtx.save();
            colorCtx.globalCompositeOperation = 'destination-over';
            const fadeTop = Math.floor((90 - (-84.6)) / 180 * TEX_H);
            const solidTop = Math.floor((90 - (-85)) / 180 * TEX_H);
            const grad = colorCtx.createLinearGradient(0, fadeTop, 0, solidTop);
            grad.addColorStop(0, 'rgba(200, 210, 220, 0)');
            grad.addColorStop(0.2, 'rgba(200, 210, 220, 0.7)');
            grad.addColorStop(1, 'rgba(200, 210, 220, 0.85)');
            colorCtx.fillStyle = grad;
            colorCtx.fillRect(0, fadeTop, TEX_W, solidTop - fadeTop);
            colorCtx.fillStyle = 'rgba(200, 210, 220, 0.85)';
            colorCtx.fillRect(0, solidTop, TEX_W, TEX_H - solidTop);
            colorCtx.restore();

            landTexture.needsUpdate = true;
        }

        function drawIdCanvas() {
            idCtx.clearRect(0, 0, TEX_W, TEX_H);
            for (let i = 0; i < features.length; i++) {
                const code = i + 1; // 0 = no country
                const r = code & 0xFF;
                const g = (code >> 8) & 0xFF;
                const b = (code >> 16) & 0xFF;
                drawFeature(idCtx, features[i], `rgb(${r},${g},${b})`, null);
            }
        }

        // === Compute centroid for labels ===
        function featureCentroid(feature) {
            const polygons = getPolygons(feature);
            let sumLon = 0, sumLat = 0, count = 0;
            for (const polygon of polygons) {
                const crosses = doesCross(polygon);
                for (const [lon, lat] of polygon[0]) {
                    let adjustedLon = lon;
                    if (crosses && lon < 0) adjustedLon += 360;
                    sumLon += adjustedLon;
                    sumLat += lat;
                    count++;
                }
            }
            if (count === 0) return null;
            let avgLon = sumLon / count;
            if (avgLon > 180) avgLon -= 360;
            return { lon: avgLon, lat: sumLat / count };
        }

        // === Load data ===
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
            .then(r => r.json())
            .then(topo => {
                const geo = topoFn.feature(topo, topo.objects.countries);
                features = geo.features;

                // Build labels
                for (const feature of features) {
                    const name = NAMES[feature.id] || '';
                    if (!name) continue;
                    const c = featureCentroid(feature);
                    if (!c) continue;
                    const pos = latLonToVec3(c.lat, c.lon, RADIUS + 2.5);
                    const div = document.createElement('div');
                    div.className = 'country-label';
                    div.textContent = name;
                    const obj = new CSS2DObject(div);
                    obj.position.copy(pos);
                    scene.add(obj);
                    labels.push(obj);
                }

                drawIdCanvas();
                redrawColorCanvas(-1);
                document.getElementById('loading').classList.add('done');
            });

        // === Hover detection via ID texture lookup ===
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9, -9);
        const nameTag = document.getElementById('country-name-tag');

        function getCountryAtMouse() {
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(landSphere);
            if (hits.length === 0) return -1;
            const uv = hits[0].uv;
            if (!uv) return -1;
            const px = Math.floor(uv.x * TEX_W) % TEX_W;
            const py = Math.floor((1 - uv.y) * TEX_H) % TEX_H;
            const pixel = idCtx.getImageData(px, py, 1, 1).data;
            const code = pixel[0] + (pixel[1] << 8) + (pixel[2] << 16);
            return code - 1;
        }

        function checkHover(fromTap) {
            const idx = getCountryAtMouse();
            if (idx === hoveredIdx) return;

            if (idx >= 0 && idx < features.length) {
                const name = NAMES[features[idx].id] || '';
                nameTag.textContent = name;
                nameTag.classList.add('visible');
                document.body.style.cursor = 'pointer';
            } else {
                nameTag.classList.remove('visible');
                document.body.style.cursor = 'default';
            }

            hoveredIdx = idx;
            redrawColorCanvas(idx);
        }

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Tap support for mobile
        let pointerDownPos = null;
        window.addEventListener('pointerdown', (e) => {
            pointerDownPos = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('pointerup', (e) => {
            if (!pointerDownPos) return;
            const dx = e.clientX - pointerDownPos.x;
            const dy = e.clientY - pointerDownPos.y;
            if (dx * dx + dy * dy < 36) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                checkHover(true);
            }
            pointerDownPos = null;
        });

        // === Label visibility ===
        function updateLabels() {
            const dist = camera.position.length();
            const show = dist < LABEL_SHOW_DIST;
            const camDir = camera.position.clone().normalize();
            for (const label of labels) {
                if (!show) { label.visible = false; continue; }
                const labelDir = label.position.clone().normalize();
                label.visible = labelDir.dot(camDir) > 0.15;
            }
        }

        // === Resize ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === Animate ===
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            checkHover();
            updateLabels();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

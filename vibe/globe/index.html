<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globe</title>
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }

        .header {
            position: fixed; top: 20px; left: 24px; z-index: 10;
            display: flex; align-items: baseline; gap: 16px;
        }
        .header h1 {
            color: #e8e8e8; font-family: 'Inter', sans-serif;
            font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em;
        }
        .header a {
            color: #555; font-family: 'Inter', sans-serif;
            font-size: 0.8rem; text-decoration: none;
        }
        .header a:hover { color: #888; }

        .country-label {
            color: rgba(220,220,220,0.9);
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            pointer-events: none;
            text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        .country-name-tag {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 8px 18px;
            color: #4baea4; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            pointer-events: none; opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 10;
            text-align: center;
            line-height: 1.4;
        }
        .country-name-tag.visible { opacity: 1; }
        .country-name-tag .density-info {
            color: #aaa; font-size: 0.8rem; font-weight: 400;
        }
        .country-name-tag .no-data {
            color: #666; font-size: 0.8rem; font-weight: 400; font-style: italic;
        }

        .loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-family: 'Inter', sans-serif; font-size: 0.85rem;
            z-index: 100; background: #000; transition: opacity 0.6s;
        }
        .loading.done { opacity: 0; pointer-events: none; }

        /* Navigation panel */
        .nav-panel {
            position: fixed; top: 60px; left: 16px; z-index: 10;
            background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a;
            border-radius: 12px; padding: 6px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            font-family: 'Inter', sans-serif;
            transition: width 0.25s ease;
            overflow: hidden;
        }
        .nav-btn {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 8px 10px;
            background: none; border: none; border-radius: 8px;
            color: #888; font-family: 'Inter', sans-serif;
            font-size: 0.78rem; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.06); color: #ccc; }
        .nav-btn.active { color: #4baea4; }
        .nav-btn svg { flex-shrink: 0; width: 18px; height: 18px; }
        .nav-btn .nav-label { overflow: hidden; transition: opacity 0.2s; }
        .nav-panel.collapsed .nav-label { opacity: 0; width: 0; }
        .nav-toggle {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 4px 10px;
            background: none; border: none; border-radius: 8px;
            color: #555; cursor: pointer;
            transition: color 0.15s;
        }
        .nav-toggle:hover { color: #999; }
        .nav-toggle svg { width: 14px; height: 14px; transition: transform 0.25s; }
        .nav-panel.collapsed .nav-toggle svg { transform: rotate(180deg); }

        /* Legend */
        .legend-panel {
            position: fixed; bottom: 24px; left: 16px; z-index: 10;
            background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 12px 14px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            font-family: 'Inter', sans-serif;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .legend-panel.visible { opacity: 1; pointer-events: auto; }
        .legend-title {
            color: #aaa; font-size: 0.65rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .legend-bar-wrap {
            display: flex; align-items: stretch; gap: 6px;
        }
        .legend-bar {
            width: 14px; height: 120px; border-radius: 3px;
        }
        .legend-ticks {
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .legend-ticks span {
            color: #999; font-size: 0.65rem; line-height: 1;
        }
        .legend-nodata {
            display: flex; align-items: center; gap: 6px;
            margin-top: 8px; color: #666; font-size: 0.65rem;
        }
        .legend-nodata-swatch {
            width: 14px; height: 10px; border-radius: 2px;
            background: #333;
        }

        /* Timeline */
        .timeline-panel {
            position: fixed; bottom: 24px; right: 16px; z-index: 10;
            background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 10px 16px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            font-family: 'Inter', sans-serif;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            display: flex; align-items: center; gap: 12px;
        }
        .timeline-panel.visible { opacity: 1; pointer-events: auto; }
        .timeline-year {
            color: #4baea4; font-size: 0.9rem; font-weight: 600;
            min-width: 36px; text-align: center;
        }
        .timeline-bound {
            color: #555; font-size: 0.65rem; font-weight: 500;
        }
        .timeline-slider {
            -webkit-appearance: none; appearance: none;
            width: 180px; height: 4px;
            background: #333; border-radius: 2px; outline: none;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px;
            background: #4baea4; border-radius: 50%;
            cursor: pointer;
        }
        .timeline-slider::-moz-range-thumb {
            width: 14px; height: 14px;
            background: #4baea4; border-radius: 50%;
            cursor: pointer; border: none;
        }

        @media (max-width: 768px) {
            .timeline-slider { width: 100px; }
            .timeline-panel { right: 8px; bottom: 16px; padding: 8px 12px; gap: 8px; }
            .legend-panel { left: 8px; bottom: 16px; }
        }
    </style>
</head>

    <div class="header">
        <h1>Globe</h1>
        <a href="/vibe/">back</a>

    <div class="country-name-tag" id="country-name-tag"></div>
    <div class="loading" id="loading">Loading globe data...</div>

    <!-- Navigation panel -->
    <div class="nav-panel" id="nav-panel">
        <button class="nav-btn active" id="btn-countries" onclick="setMode('countries')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            <span class="nav-label">Countries</span>
        </button>
        <button class="nav-btn" id="btn-density" onclick="setMode('density')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/>
            </svg>
            <span class="nav-label">Density</span>
        </button>
        <button class="nav-toggle" id="nav-toggle" onclick="toggleNav()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
    </div>

    <!-- Legend (density mode) -->
    <div class="legend-panel" id="legend-panel">
        <div class="legend-title">People / km&sup2;</div>
        <div class="legend-bar-wrap">
            <canvas id="legend-bar" class="legend-bar" width="14" height="120"></canvas>
            <div class="legend-ticks">

                <span>1k</span>
                <span>100</span>
                <span>10</span>
                <span>1</span>
            </div>
        </div>
        <div class="legend-nodata">
            <div class="legend-nodata-swatch"></div>
            <span>No data</span>
        </div>
    </div>

    <!-- Timeline (density mode) -->
    <div class="timeline-panel" id="timeline-panel">
        <span class="timeline-bound">1960</span>
        <input type="range" class="timeline-slider" id="timeline-slider"

        <span class="timeline-bound">2023</span>
        <span class="timeline-year" id="timeline-year">2023</span>
    </div>

        // App state

        // Density color ramp (log scale, 5 stops)
        // 1/km² → 10 → 100 → 1000 → 10000
        const DENSITY_COLORS = [
            { val: 1,     r: 255, g: 255, b: 204 },  // #ffffcc
            { val: 10,    r: 254, g: 217, b: 118 },  // #fed976
            { val: 100,   r: 253, g: 141, b: 60  },  // #fd8d3c
            { val: 1000,  r: 227, g: 26,  b: 28  },  // #e31a1c
            { val: 10000, r: 128, g: 0,   b: 38  }   // #800026
        ];
        const NO_DATA_COLOR = '#333';

        function densityToColor(density) {
            if (density <= 0) return NO_DATA_COLOR;
            const logD = Math.log10(density);
            const stops = DENSITY_COLORS;
            if (logD <= Math.log10(stops[0].val)) return `rgb(${stops[0].r},${stops[0].g},${stops[0].b})`;
            if (logD >= Math.log10(stops[stops.length-1].val)) {
                const s = stops[stops.length-1];
                return `rgb(${s.r},${s.g},${s.b})`;
            }
            for (let i = 0; i < stops.length - 1; i++) {
                const lo = Math.log10(stops[i].val);
                const hi = Math.log10(stops[i+1].val);
                if (logD >= lo && logD <= hi) {
                    const t = (logD - lo) / (hi - lo);
                    const r = Math.round(stops[i].r + t * (stops[i+1].r - stops[i].r));
                    const g = Math.round(stops[i].g + t * (stops[i+1].g - stops[i].g));
                    const b = Math.round(stops[i].b + t * (stops[i+1].b - stops[i].b));
                    return `rgb(${r},${g},${b})`;
                }
            }
            return NO_DATA_COLOR;
        }

        function getDensity(isoNum, yearIdx) {
            const d = DENSITY_DATA[isoNum];
            if (!d) return null;
            const pop = d.p[yearIdx];
            if (pop == null) return null;
            return (pop * 1000) / d.a;
        }

                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    vViewPos = mv.xyz;

                }

                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vec3 view = normalize(-vViewPos);
                    float f = 1.0 - max(dot(view, vNormal), 0.0);

                    vec3 mid  = vec3(0.015, 0.06, 0.14);

            for (let r = 0; r < polygon.length; r++) {
                const ring = polygon[r];
                for (let i = 0; i < ring.length; i++) {
                    let lon = ring[i][0];
                    if (crosses && lon < 0) lon += 360;
                    const [x, y] = lonLatToPixel(lon, ring[i][1]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
            }
        }

        function getPolygons(feature) {
            const type = feature.geometry.type;
            if (type === 'Polygon') return [feature.geometry.coordinates];
            if (type === 'MultiPolygon') return feature.geometry.coordinates;
            return [];
        }

        function doesCross(polygon) {
            const ring = polygon[0];
            for (let i = 1; i < ring.length - 1; i++) {
                if (Math.abs(ring[i][0] - ring[i - 1][0]) > 180) return true;
            }
            return false;
        }

        function drawFeature(ctx, feature, fillStyle, strokeStyle, lineWidth) {
            const polygons = getPolygons(feature);
            for (const polygon of polygons) {
                const crosses = doesCross(polygon);

                if (fillStyle) {
                    ctx.fillStyle = fillStyle;
                    tracePolygon(ctx, polygon, crosses);
                    ctx.fill('evenodd');
                    if (crosses) {
                        ctx.save();
                        ctx.translate(-TEX_W, 0);
                        tracePolygon(ctx, polygon, crosses);
                        ctx.fill('evenodd');
                        ctx.restore();
                    }
                }
                if (strokeStyle) {
                    ctx.strokeStyle = strokeStyle;
                    ctx.lineWidth = lineWidth || 1;
                    tracePolygon(ctx, polygon, crosses);
                    ctx.stroke();
                    if (crosses) {
                        ctx.save();
                        ctx.translate(-TEX_W, 0);
                        tracePolygon(ctx, polygon, crosses);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        function redrawColorCanvas(hoverIdx) {
            colorCtx.clearRect(0, 0, TEX_W, TEX_H);
            const yearIdx = state.year - DENSITY_START_YEAR;

            if (state.mode === 'density') {
                // Density mode: colored by population density
                for (let i = 0; i < features.length; i++) {
                    const isoNum = features[i].id;
                    const density = getDensity(isoNum, yearIdx);
                    let fill;
                    if (i === hoverIdx) {
                        fill = LAND_HOVER;
                    } else {
                        fill = density != null ? densityToColor(density) : NO_DATA_COLOR;
                    }
                    drawFeature(colorCtx, features[i], fill, null);
                }
                // Thin semi-transparent borders in density mode
                for (let i = 0; i < features.length; i++) {
                    drawFeature(colorCtx, features[i], null, 'rgba(0,0,0,0.3)', 0.8);
                }
            } else {
                // Countries mode: original green
                for (let i = 0; i < features.length; i++) {
                    const fill = (i === hoverIdx) ? LAND_HOVER : LAND_FILL;
                    drawFeature(colorCtx, features[i], fill, null);
                }
                for (let i = 0; i < features.length; i++) {
                    drawFeature(colorCtx, features[i], null, BORDER_STROKE, BORDER_WIDTH);
                }
            }

            // South pole ice cap
            colorCtx.save();
            colorCtx.globalCompositeOperation = 'destination-over';
            const fadeTop = Math.floor((90 - (-84.6)) / 180 * TEX_H);
            const solidTop = Math.floor((90 - (-85)) / 180 * TEX_H);
            const grad = colorCtx.createLinearGradient(0, fadeTop, 0, solidTop);
            grad.addColorStop(0, 'rgba(200, 210, 220, 0)');
            grad.addColorStop(0.2, 'rgba(200, 210, 220, 0.7)');
            grad.addColorStop(1, 'rgba(200, 210, 220, 0.85)');
            colorCtx.fillStyle = grad;
            colorCtx.fillRect(0, fadeTop, TEX_W, solidTop - fadeTop);
            colorCtx.fillStyle = 'rgba(200, 210, 220, 0.85)';
            colorCtx.fillRect(0, solidTop, TEX_W, TEX_H - solidTop);
            colorCtx.restore();

            landTexture.needsUpdate = true;
        }

        function drawIdCanvas() {
            idCtx.clearRect(0, 0, TEX_W, TEX_H);
            for (let i = 0; i < features.length; i++) {
                const code = i + 1;
                const r = code & 0xFF;
                const g = (code >> 8) & 0xFF;
                const b = (code >> 16) & 0xFF;
                drawFeature(idCtx, features[i], `rgb(${r},${g},${b})`, null);
            }
        }

        function featureCentroid(feature) {
            const polygons = getPolygons(feature);
            let sumLon = 0, sumLat = 0, count = 0;
            for (const polygon of polygons) {
                const crosses = doesCross(polygon);
                for (const [lon, lat] of polygon[0]) {
                    let adjustedLon = lon;
                    if (crosses && lon < 0) adjustedLon += 360;
                    sumLon += adjustedLon;
                    sumLat += lat;
                    count++;
                }
            }
            if (count === 0) return null;
            let avgLon = sumLon / count;
            if (avgLon > 180) avgLon -= 360;
            return { lon: avgLon, lat: sumLat / count };
        }

        // === Load data ===
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
            .then(r => r.json())
            .then(topo => {
                const geo = topoFn.feature(topo, topo.objects.countries);
                features = geo.features;

                for (const feature of features) {
                    const name = NAMES[feature.id] || '';
                    if (!name) continue;
                    const c = featureCentroid(feature);
                    if (!c) continue;
                    const pos = latLonToVec3(c.lat, c.lon, RADIUS + 2.5);
                    const div = document.createElement('div');
                    div.className = 'country-label';
                    div.textContent = name;
                    const obj = new CSS2DObject(div);
                    obj.position.copy(pos);
                    scene.add(obj);
                    labels.push(obj);
                }

                drawIdCanvas();
                redrawColorCanvas(-1);
                initLegend();
                document.getElementById('loading').classList.add('done');
            });

        // === Hover detection ===
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9, -9);
        const nameTag = document.getElementById('country-name-tag');

        function getCountryAtMouse() {
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(landSphere);
            if (hits.length === 0) return -1;
            const uv = hits[0].uv;
            if (!uv) return -1;
            const px = Math.floor(uv.x * TEX_W) % TEX_W;
            const py = Math.floor((1 - uv.y) * TEX_H) % TEX_H;
            const pixel = idCtx.getImageData(px, py, 1, 1).data;
            const code = pixel[0] + (pixel[1] << 8) + (pixel[2] << 16);
            return code - 1;
        }

        function formatNum(n) {
            return n.toLocaleString('en-US');
        }

        function checkHover(fromTap) {
            const idx = getCountryAtMouse();
            if (idx === hoveredIdx) return;

            if (idx >= 0 && idx < features.length) {
                const isoNum = features[idx].id;
                const name = NAMES[isoNum] || '';

                if (state.mode === 'density') {
                    const yearIdx = state.year - DENSITY_START_YEAR;
                    const density = getDensity(isoNum, yearIdx);
                    const d = DENSITY_DATA[isoNum];
                    if (density != null && d) {
                        const pop = d.p[yearIdx] * 1000;
                        nameTag.innerHTML =
                            `<span style="color:#4baea4;font-weight:600">${name}</span><br>` +
                            `<span class="density-info">${density.toFixed(1)} / km&sup2; &middot; pop ${formatNum(pop)}</span>`;
                    } else {
                        nameTag.innerHTML =
                            `<span style="color:#4baea4;font-weight:600">${name}</span><br>` +
                            `<span class="no-data">No data</span>`;
                    }
                } else {
                    nameTag.innerHTML = `<span style="color:#4baea4;font-weight:600">${name}</span>`;
                }

                nameTag.classList.add('visible');
                document.body.style.cursor = 'pointer';
            } else {
                nameTag.classList.remove('visible');
                document.body.style.cursor = 'default';
            }

            hoveredIdx = idx;
            redrawColorCanvas(idx);
        }

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        let pointerDownPos = null;
        window.addEventListener('pointerdown', (e) => {
            pointerDownPos = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('pointerup', (e) => {
            if (!pointerDownPos) return;
            const dx = e.clientX - pointerDownPos.x;
            const dy = e.clientY - pointerDownPos.y;
            if (dx * dx + dy * dy < 36) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                checkHover(true);
            }
            pointerDownPos = null;
        });

        // === Label visibility ===
        function updateLabels() {
            const dist = camera.position.length();
            const show = dist < LABEL_SHOW_DIST;
            const camDir = camera.position.clone().normalize();
            for (const label of labels) {
                if (!show) { label.visible = false; continue; }
                const labelDir = label.position.clone().normalize();
                label.visible = labelDir.dot(camDir) > 0.15;
            }
        }

        // === Mode switching ===
        const legendPanel = document.getElementById('legend-panel');
        const timelinePanel = document.getElementById('timeline-panel');
        const btnCountries = document.getElementById('btn-countries');
        const btnDensity = document.getElementById('btn-density');
        const navPanel = document.getElementById('nav-panel');
        const timelineSlider = document.getElementById('timeline-slider');
        const timelineYear = document.getElementById('timeline-year');

        function setMode(mode) {
            state.mode = mode;
            btnCountries.classList.toggle('active', mode === 'countries');
            btnDensity.classList.toggle('active', mode === 'density');
            legendPanel.classList.toggle('visible', mode === 'density');
            timelinePanel.classList.toggle('visible', mode === 'density');

            // Clear hover on mode switch
            hoveredIdx = -1;
            nameTag.classList.remove('visible');
            document.body.style.cursor = 'default';

            redrawColorCanvas(-1);
        }
        window.setMode = setMode;

        function toggleNav() {
            state.panelOpen = !state.panelOpen;
            navPanel.classList.toggle('collapsed', !state.panelOpen);
        }
        window.toggleNav = toggleNav;

        // Mobile: start collapsed
        if (window.innerWidth < 768) {
            state.panelOpen = false;
            navPanel.classList.add('collapsed');
        }

        // === Timeline slider ===
        let redrawPending = false;
        timelineSlider.addEventListener('input', (e) => {
            state.year = parseInt(e.target.value);
            timelineYear.textContent = state.year;
            if (!redrawPending) {
                redrawPending = true;
                requestAnimationFrame(() => {
                    redrawColorCanvas(hoveredIdx);
                    redrawPending = false;
                });
            }
        });

        // Prevent OrbitControls from stealing slider events
        timelinePanel.addEventListener('pointerdown', (e) => e.stopPropagation());
        timelinePanel.addEventListener('pointermove', (e) => e.stopPropagation());
        navPanel.addEventListener('pointerdown', (e) => e.stopPropagation());

        // === Legend gradient bar ===
        function initLegend() {
            const canvas = document.getElementById('legend-bar');
            const ctx = canvas.getContext('2d');
            const h = canvas.height;
            for (let y = 0; y < h; y++) {
                const t = 1 - y / h;  // 0 at bottom, 1 at top
                const logVal = Math.log10(1) + t * (Math.log10(10000) - Math.log10(1));
                const density = Math.pow(10, logVal);
                const color = densityToColor(density);
                ctx.fillStyle = color;
                ctx.fillRect(0, y, canvas.width, 1);
            }
        }

        // === Resize ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === Animate ===
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            checkHover();
            updateLabels();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

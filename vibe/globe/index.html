<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globe</title>
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }

        .header {
            position: fixed; top: 20px; left: 24px; z-index: 10;
            display: flex; align-items: baseline; gap: 16px;
        }
        .header h1 {
            color: #e8e8e8; font-family: 'Inter', sans-serif;
            font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em;
        }
        .header a {
            color: #555; font-family: 'Inter', sans-serif;
            font-size: 0.8rem; text-decoration: none;
        }
        .header a:hover { color: #888; }

        .country-label {
            color: rgba(220,220,220,0.9);
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            pointer-events: none;
            text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        .country-name-tag {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 8px 18px;
            color: #4baea4; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            pointer-events: none; opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }
        .country-name-tag.visible { opacity: 1; }

        .loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-family: 'Inter', sans-serif; font-size: 0.85rem;
            z-index: 100; background: #000; transition: opacity 0.6s;
        }
        .loading.done { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Globe</h1>
        <a href="/vibe/">back</a>
    </div>
    <div class="country-name-tag" id="country-name-tag"></div>
    <div class="loading" id="loading">Loading globe data...</div>

    <script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const earcutFn = window.earcut;
        const topoFn = window.topojson;

        // Country names by ISO 3166-1 numeric code
        const NAMES = {
            "004":"Afghanistan","008":"Albania","012":"Algeria","024":"Angola",
            "010":"Antarctica","032":"Argentina","051":"Armenia","036":"Australia",
            "040":"Austria","031":"Azerbaijan","044":"Bahamas","050":"Bangladesh",
            "112":"Belarus","056":"Belgium","084":"Belize","204":"Benin",
            "064":"Bhutan","068":"Bolivia","070":"Bosnia & Herz.","072":"Botswana",
            "076":"Brazil","096":"Brunei","100":"Bulgaria","854":"Burkina Faso",
            "108":"Burundi","116":"Cambodia","120":"Cameroon","124":"Canada",
            "140":"Central African Rep.","148":"Chad","152":"Chile","156":"China",
            "170":"Colombia","178":"Congo","180":"Dem. Rep. Congo","188":"Costa Rica",
            "384":"Ivory Coast","191":"Croatia","192":"Cuba","196":"Cyprus",
            "203":"Czechia","208":"Denmark","262":"Djibouti","214":"Dominican Rep.",
            "218":"Ecuador","818":"Egypt","222":"El Salvador","226":"Eq. Guinea",
            "232":"Eritrea","233":"Estonia","231":"Ethiopia","242":"Fiji",
            "246":"Finland","250":"France","266":"Gabon","270":"Gambia",
            "268":"Georgia","276":"Germany","288":"Ghana","300":"Greece",
            "304":"Greenland","320":"Guatemala","324":"Guinea","624":"Guinea-Bissau",
            "328":"Guyana","332":"Haiti","340":"Honduras","348":"Hungary",
            "352":"Iceland","356":"India","360":"Indonesia","364":"Iran",
            "368":"Iraq","372":"Ireland","376":"Israel","380":"Italy",
            "388":"Jamaica","392":"Japan","400":"Jordan","398":"Kazakhstan",
            "404":"Kenya","408":"N. Korea","410":"S. Korea","414":"Kuwait",
            "417":"Kyrgyzstan","418":"Laos","428":"Latvia","422":"Lebanon",
            "426":"Lesotho","430":"Liberia","434":"Libya","440":"Lithuania",
            "442":"Luxembourg","450":"Madagascar","454":"Malawi","458":"Malaysia",
            "466":"Mali","478":"Mauritania","484":"Mexico","498":"Moldova",
            "496":"Mongolia","499":"Montenegro","504":"Morocco","508":"Mozambique",
            "104":"Myanmar","516":"Namibia","524":"Nepal","528":"Netherlands",
            "540":"New Caledonia","554":"New Zealand","558":"Nicaragua","562":"Niger",
            "566":"Nigeria","578":"Norway","512":"Oman","586":"Pakistan",
            "275":"Palestine","591":"Panama","598":"Papua New Guinea","600":"Paraguay",
            "604":"Peru","608":"Philippines","616":"Poland","620":"Portugal",
            "630":"Puerto Rico","634":"Qatar","642":"Romania","643":"Russia",
            "646":"Rwanda","682":"Saudi Arabia","686":"Senegal","688":"Serbia",
            "694":"Sierra Leone","703":"Slovakia","705":"Slovenia","706":"Somalia",
            "710":"South Africa","728":"South Sudan","724":"Spain","144":"Sri Lanka",
            "729":"Sudan","740":"Suriname","748":"Eswatini","752":"Sweden",
            "756":"Switzerland","760":"Syria","158":"Taiwan","762":"Tajikistan",
            "834":"Tanzania","764":"Thailand","626":"Timor-Leste","768":"Togo",
            "780":"Trinidad & Tobago","788":"Tunisia","792":"Turkey",
            "795":"Turkmenistan","800":"Uganda","804":"Ukraine","784":"UAE",
            "826":"United Kingdom","840":"United States","858":"Uruguay",
            "860":"Uzbekistan","548":"Vanuatu","862":"Venezuela","704":"Vietnam",
            "887":"Yemen","894":"Zambia","716":"Zimbabwe",
            "807":"N. Macedonia","174":"Comoros","090":"Solomon Is."
        };

        // Constants
        const RADIUS = 100;
        const COUNTRY_ALT = 0.2;
        const BORDER_ALT = 0.35;
        const POP_ALT = 1.2;
        const LABEL_SHOW_DIST = 220;
        const BASE_COLOR = 0x1c2c22;
        const HOVER_COLOR = 0x4baea4;
        const BORDER_COLOR = 0x2a4a35;

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera
        const camera = new THREE.PerspectiveCamera(
            45, window.innerWidth / window.innerHeight, 1, 2000
        );
        camera.position.set(0, 50, 280);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // CSS2D Renderer (labels)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 115;
        controls.maxDistance = 500;
        controls.enablePan = false;
        controls.rotateSpeed = 0.5;
        controls.zoomSpeed = 0.8;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 3, 4);
        scene.add(dirLight);

        // === Ocean ===
        const oceanMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    vViewPos = mv.xyz;
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vec3 view = normalize(-vViewPos);
                    float f = 1.0 - max(dot(view, vNormal), 0.0);
                    f = pow(f, 2.8);
                    vec3 deep = vec3(0.008, 0.03, 0.09);
                    vec3 mid  = vec3(0.015, 0.06, 0.14);
                    vec3 rim  = vec3(0.04, 0.12, 0.24);
                    vec3 c = mix(deep, mid, 0.25 + f * 0.35);
                    c = mix(c, rim, f);
                    gl_FragColor = vec4(c, 1.0);
                }
            `
        });
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(RADIUS, 128, 128), oceanMat
        ));

        // === Atmosphere glow ===
        const atmosMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vViewPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vViewPos;
                void main() {
                    vec3 v = normalize(-vViewPos);
                    float rim = 1.0 - max(dot(v, vNormal), 0.0);
                    rim = pow(rim, 4.0);
                    gl_FragColor = vec4(0.15, 0.4, 0.7, rim * 0.25);
                }
            `,
            transparent: true, side: THREE.BackSide, depthWrite: false
        });
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(RADIUS * 1.02, 64, 64), atmosMat
        ));

        // === Stars ===
        const starPos = new Float32Array(3000 * 3);
        for (let i = 0; i < 3000; i++) {
            const r = 700 + Math.random() * 500;
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            starPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
            starPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
            starPos[i*3+2] = r * Math.cos(ph);
        }
        const starGeom = new THREE.BufferGeometry();
        starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeom,
            new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true })
        ));

        // === Utilities ===
        function latLonToVec3(lat, lon, r) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }

        // === Country building ===
        const countryGroups = [];
        const countryLayer = new THREE.Group();
        const borderLayer = new THREE.Group();
        scene.add(countryLayer);
        scene.add(borderLayer);
        const labels = [];

        function buildCountry(feature) {
            const id = feature.id;
            const name = NAMES[id] || '';

            let polygons = [];
            if (feature.geometry.type === 'Polygon') {
                polygons = [feature.geometry.coordinates];
            } else if (feature.geometry.type === 'MultiPolygon') {
                polygons = feature.geometry.coordinates;
            }
            if (polygons.length === 0) return;

            const material = new THREE.MeshStandardMaterial({
                color: BASE_COLOR,
                roughness: 0.85,
                metalness: 0.05,
                emissive: 0x060e08,
                emissiveIntensity: 0.4,
                side: THREE.DoubleSide
            });

            const group = new THREE.Group();
            let cLon = 0, cLat = 0, cN = 0;

            for (const polygon of polygons) {
                const outerRing = polygon[0];
                const holes = polygon.slice(1);

                // Flatten for earcut
                const flat = [];
                const holeIdx = [];

                for (const [lon, lat] of outerRing) {
                    flat.push(lon, lat);
                    cLon += lon; cLat += lat; cN++;
                }
                for (const hole of holes) {
                    holeIdx.push(flat.length / 2);
                    for (const [lon, lat] of hole) flat.push(lon, lat);
                }

                const indices = earcutFn(flat, holeIdx.length ? holeIdx : undefined);
                if (indices.length === 0) continue;

                const numVerts = flat.length / 2;
                const positions = new Float32Array(numVerts * 3);
                const normals = new Float32Array(numVerts * 3);

                for (let i = 0; i < numVerts; i++) {
                    const v = latLonToVec3(flat[i*2+1], flat[i*2], RADIUS + COUNTRY_ALT);
                    positions[i*3]   = v.x;
                    positions[i*3+1] = v.y;
                    positions[i*3+2] = v.z;
                    // Normal = outward from sphere center
                    const len = v.length();
                    normals[i*3]   = v.x / len;
                    normals[i*3+1] = v.y / len;
                    normals[i*3+2] = v.z / len;
                }

                const geom = new THREE.BufferGeometry();
                geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geom.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
                geom.setIndex(Array.from(indices));
                group.add(new THREE.Mesh(geom, material));

                // Border line from outer ring
                const bPts = outerRing.map(([lon, lat]) =>
                    latLonToVec3(lat, lon, RADIUS + BORDER_ALT)
                );
                const bGeom = new THREE.BufferGeometry().setFromPoints(bPts);
                borderLayer.add(new THREE.LineLoop(bGeom,
                    new THREE.LineBasicMaterial({ color: BORDER_COLOR })
                ));
            }

            if (group.children.length === 0) return;

            // Centroid direction for pop effect
            const centroid = latLonToVec3(cLat / cN, cLon / cN, 1).normalize();

            group.userData = { name, id, material, centroid };
            countryLayer.add(group);
            countryGroups.push(group);

            // Label
            if (name) {
                const labelPos = latLonToVec3(cLat / cN, cLon / cN, RADIUS + 2.5);
                const div = document.createElement('div');
                div.className = 'country-label';
                div.textContent = name;
                const obj = new CSS2DObject(div);
                obj.position.copy(labelPos);
                scene.add(obj);
                labels.push(obj);
            }
        }

        // === Load data ===
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
            .then(r => r.json())
            .then(topo => {
                const geo = topoFn.feature(topo, topo.objects.countries);
                geo.features.forEach(buildCountry);
                document.getElementById('loading').classList.add('done');
            });

        // === Hover / raycasting ===
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9, -9);
        let hoveredGroup = null;
        const nameTag = document.getElementById('country-name-tag');

        function setHover(group) {
            if (group === hoveredGroup) return;

            // Unhover previous
            if (hoveredGroup) {
                const { material, centroid } = hoveredGroup.userData;
                material.color.setHex(BASE_COLOR);
                material.emissive.setHex(0x060e08);
                hoveredGroup.position.set(0, 0, 0);
            }

            // Hover new
            if (group) {
                const { material, centroid, name } = group.userData;
                material.color.setHex(HOVER_COLOR);
                material.emissive.setHex(0x0a2a25);
                // Pop out
                group.position.copy(centroid.clone().multiplyScalar(POP_ALT));
                nameTag.textContent = name;
                nameTag.classList.add('visible');
                document.body.style.cursor = 'pointer';
            } else {
                nameTag.classList.remove('visible');
                document.body.style.cursor = 'default';
            }

            hoveredGroup = group;
        }

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Tap support for mobile
        let pointerDownPos = null;
        window.addEventListener('pointerdown', (e) => {
            pointerDownPos = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('pointerup', (e) => {
            if (!pointerDownPos) return;
            const dx = e.clientX - pointerDownPos.x;
            const dy = e.clientY - pointerDownPos.y;
            if (dx * dx + dy * dy < 36) {
                // Tap — update mouse and force a hover check
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                checkHover(true);
            }
            pointerDownPos = null;
        });

        function checkHover(fromTap = false) {
            raycaster.setFromCamera(mouse, camera);
            const meshes = [];
            countryGroups.forEach(g => g.children.forEach(m => meshes.push(m)));
            const hits = raycaster.intersectObjects(meshes);

            if (hits.length > 0) {
                setHover(hits[0].object.parent);
            } else if (fromTap) {
                setHover(null);
            } else {
                setHover(null);
            }
        }

        // === Label visibility ===
        function updateLabels() {
            const dist = camera.position.length();
            const show = dist < LABEL_SHOW_DIST;
            const camDir = camera.position.clone().normalize();

            for (const label of labels) {
                if (!show) {
                    label.visible = false;
                    continue;
                }
                // Only show if facing camera
                const labelDir = label.position.clone().normalize();
                label.visible = labelDir.dot(camDir) > 0.15;
            }
        }

        // === Resize ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === Animate ===
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            checkHover();
            updateLabels();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

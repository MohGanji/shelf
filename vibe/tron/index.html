<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tron: Light Cycles</title>
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app-root">
      <canvas id="game-canvas" tabindex="0" aria-label="Tron game viewport"></canvas>

      <div id="boot-overlay" class="boot-overlay" aria-live="polite">
        <div class="boot-overlay__title">TRON: LIGHT CYCLES</div>
        <div
          class="boot-overlay__bar-wrap"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          id="boot-progress-label"
        >
          <div class="boot-overlay__bar" id="boot-progress-fill"></div>
        </div>
      </div>

      <div
        id="nitro-speed-lines"
        class="nitro-speed-lines"
        aria-hidden="true"
      ></div>

      <div id="cycle-hud" class="cycle-hud" aria-live="polite">
        <div class="cycle-hud__row cycle-hud__row--speed">
          <span class="cycle-hud__icon" aria-hidden="true">⚡</span>
          <span id="hud-speed" class="cycle-hud__speed">0</span>
          <span class="cycle-hud__unit">u/s</span>
          <span class="cycle-hud__trail-wrap" aria-hidden="true">
            <span class="cycle-hud__icon">╱╲</span>
            <span id="hud-trail" class="cycle-hud__trail">0</span>
          </span>
          <span id="hud-timer-wrap" class="cycle-hud__timer-wrap" hidden>
            <span class="cycle-hud__icon" aria-hidden="true">⏱</span>
            <span id="hud-timer" class="cycle-hud__timer">00:00</span>
          </span>
        </div>
        <div
          id="hud-nitro"
          class="nitro-bar-strip"
          role="img"
          aria-label="Nitro charges"
        ></div>
        <p id="hud-hint" class="cycle-hud__hint"></p>
      </div>

      <div id="lobby-placeholder" class="state-banner state-banner--hidden" hidden>
        <p>
          Campaign hub — south entrance spawn; north gates (arena, garage, architect). WASD to ride; orbit with mouse.
        </p>
      </div>

      <div id="derez-overlay" class="derez-overlay" hidden aria-live="assertive">
        <p class="derez-overlay__title">DEREZZED</p>
        <p class="derez-overlay__sub">Trail or cycle collision — hold the line.</p>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>

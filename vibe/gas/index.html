<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gas Log</title>
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #151515;
            --surface-2: #1e1e1e;
            --border: #2a2a2a;
            --text: #e8e8e8;
            --text-dim: #888;
            --accent: #4baea4;
            --accent-dim: rgba(75, 174, 164, 0.15);
            --red: #ff5c5c;
            --radius: 14px;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }

        /* Form */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 40px 14px 14px;
            color: var(--text);
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .input-wrap input:focus {
            border-color: var(--accent);
        }

        .input-wrap input::placeholder {
            color: #444;
        }

        .input-unit {
            position: absolute;
            right: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            pointer-events: none;
        }

        /* Result row */
        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--accent-dim);
            border: 1px solid rgba(75, 174, 164, 0.25);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 16px;
            min-height: 50px;
        }

        .result-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .result-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .result-value .result-unit {
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* Note input */
        .note-group {
            margin-bottom: 16px;
        }

        .note-group input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 400;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .note-group input:focus {
            border-color: var(--accent);
        }

        .note-group input::placeholder {
            color: #444;
        }

        /* Submit */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        /* Chart */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .chart-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .chart-avg {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .chart-avg .unit {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.5;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 160px;
        }

        .chart-container svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .chart-tooltip {
            position: absolute;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 10;
            white-space: nowrap;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .chart-tooltip.visible {
            opacity: 1;
        }

        .chart-tooltip .tt-consumption {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.95rem;
        }

        .chart-tooltip .tt-details {
            color: var(--text-dim);
        }

        .chart-tooltip .tt-note {
            color: #666;
            font-style: italic;
            margin-top: 2px;
        }

        .chart-tooltip .tt-date {
            color: #555;
            font-size: 0.7rem;
        }

        /* History */
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .history-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .history-count {
            font-size: 0.8rem;
            color: var(--text-dim);
            background: var(--surface);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .history-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 40px;
        }

        .entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .entry-left {
            flex: 1;
            min-width: 0;
        }

        .entry-main {
            display: flex;
            align-items: baseline;
            gap: 16px;
            min-width: 0;
        }

        .entry-consumption {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .entry-consumption .unit {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.7;
        }

        .entry-details {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            gap: 10px;
            white-space: nowrap;
        }

        .entry-details span {
            font-variant-numeric: tabular-nums;
        }

        .entry-note {
            font-size: 0.75rem;
            color: #666;
            font-style: italic;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-date {
            font-size: 0.7rem;
            color: #555;
            white-space: nowrap;
        }

        .entry-delete {
            background: none;
            border: none;
            color: #444;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 0 4px 12px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }

        .entry-delete:hover {
            color: var(--red);
        }

        /* Data actions (export/import/clear) */
        .data-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 0 24px;
            flex-wrap: wrap;
        }

        .data-actions button {
            background: none;
            border: none;
            color: #444;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            padding: 6px 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .data-actions button:hover {
            color: var(--text-dim);
        }

        .data-actions .data-sep {
            color: #2a2a2a;
            font-size: 0.8rem;
            user-select: none;
        }

        .data-actions .btn-danger:hover {
            color: var(--red);
        }

        /* Confirm modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 340px;
            width: 100%;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-message {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-btn:active { opacity: 0.8; }

        .modal-btn-cancel {
            background: var(--surface-2);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .modal-btn-danger {
            background: var(--red);
            color: #fff;
        }

        /* Input type number - hide spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>Gas Log</h1>
            <a href="/vibe/">back</a>
        </header>

        <div class="form-card">
            <div class="input-row">
                <div class="input-group">
                    <label for="liters">Fuel</label>
                    <div class="input-wrap">
                        <input type="number" id="liters" inputmode="decimal" step="0.01" placeholder="0.00" autocomplete="off">
                        <span class="input-unit">L</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="distance">Distance</label>
                    <div class="input-wrap">
                        <input type="number" id="distance" inputmode="decimal" step="0.01" placeholder="0.00" autocomplete="off">
                        <span class="input-unit">km</span>
                    </div>
                </div>
            </div>

            <div class="result-row">
                <span class="result-label">Consumption</span>
                <span class="result-value" id="consumption">&mdash;</span>
            </div>

            <div class="note-group">
                <input type="text" id="note" placeholder="Note (optional)" autocomplete="off" maxlength="100">
            </div>

            <button class="submit-btn" id="submit-btn" disabled>Add Fill-up</button>
        </div>

        <div id="history-section" style="display:none;">
            <div class="chart-card" id="chart-card">
                <div class="chart-header">
                    <span class="chart-title">Consumption</span>
                    <span class="chart-avg" id="chart-avg"></span>
                </div>
                <div class="chart-container" id="chart-container">
                    <svg id="chart-svg" preserveAspectRatio="none"></svg>
                    <div class="chart-tooltip" id="chart-tooltip"></div>
                </div>
            </div>

            <div class="history-header">
                <h2>History</h2>
                <span class="history-count" id="history-count"></span>
            </div>

            <div class="history-list" id="history-list"></div>

            <div class="data-actions" id="data-actions-full">
                <button id="export-btn">Export</button>
                <span class="data-sep">/</span>
                <button id="import-btn-full">Import</button>
                <span class="data-sep">/</span>
                <button id="clear-all-btn" class="btn-danger">Clear all</button>
            </div>
        </div>

        <div class="data-actions" id="data-actions-empty" style="display:none;">
            <button id="import-btn-empty">Import</button>
        </div>
        <input type="file" id="import-file" accept=".json" style="display:none">
    </div>

    <!-- Confirm modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-message" id="modal-message"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
                <button class="modal-btn modal-btn-danger" id="modal-confirm">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'gas_log_entries';

        const litersInput = document.getElementById('liters');
        const distanceInput = document.getElementById('distance');
        const noteInput = document.getElementById('note');
        const consumptionEl = document.getElementById('consumption');
        const submitBtn = document.getElementById('submit-btn');
        const historySection = document.getElementById('history-section');
        const historyList = document.getElementById('history-list');
        const historyCount = document.getElementById('history-count');
        const chartAvg = document.getElementById('chart-avg');
        const chartSvg = document.getElementById('chart-svg');
        const chartContainer = document.getElementById('chart-container');
        const chartTooltip = document.getElementById('chart-tooltip');
        const clearAllBtn = document.getElementById('clear-all-btn');
        const exportBtn = document.getElementById('export-btn');
        const importBtnFull = document.getElementById('import-btn-full');
        const importBtnEmpty = document.getElementById('import-btn-empty');
        const importFile = document.getElementById('import-file');
        const dataActionsFull = document.getElementById('data-actions-full');
        const dataActionsEmpty = document.getElementById('data-actions-empty');

        // Modal
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalCancel = document.getElementById('modal-cancel');
        const modalConfirm = document.getElementById('modal-confirm');
        let modalResolve = null;

        function showModal(title, message) {
            return new Promise((resolve) => {
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                modalResolve = resolve;
                modalOverlay.classList.add('active');
            });
        }

        function closeModal(result) {
            modalOverlay.classList.remove('active');
            if (modalResolve) {
                modalResolve(result);
                modalResolve = null;
            }
        }

        modalCancel.addEventListener('click', () => closeModal(false));
        modalConfirm.addEventListener('click', () => closeModal(true));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal(false);
        });

        function loadEntries() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        function saveEntries(entries) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }

        let chartEntries = []; // reference for tooltip

        function calcConsumption(liters, km) {
            if (!km || km === 0) return null;
            return liters / (km / 100);
        }

        function formatNum(n, decimals = 2) {
            return Number(n).toFixed(decimals);
        }

        function formatDate(iso) {
            const d = new Date(iso);
            const day = d.getDate();
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const month = months[d.getMonth()];
            const year = String(d.getFullYear()).slice(2);
            return `${day} ${month} '${year}`;
        }

        function updateCalc() {
            const l = parseFloat(litersInput.value);
            const d = parseFloat(distanceInput.value);

            if (l > 0 && d > 0) {
                const c = calcConsumption(l, d);
                consumptionEl.innerHTML = `${formatNum(c, 1)}<span class="result-unit">l/100km</span>`;
                submitBtn.disabled = false;
            } else {
                consumptionEl.innerHTML = '&mdash;';
                submitBtn.disabled = true;
            }
        }

        function renderChart(entries) {
            chartTooltip.classList.remove('visible');
            if (entries.length < 2) {
                document.getElementById('chart-card').style.display = 'none';
                return;
            }
            document.getElementById('chart-card').style.display = 'block';
            chartEntries = entries;

            const values = entries.map(e => e.consumption);
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            chartAvg.innerHTML = `avg ${formatNum(avg, 1)} <span class="unit">l/100km</span>`;

            const dataMin = Math.min(...values);
            const dataMax = Math.max(...values);
            const range = dataMax - dataMin;
            // Add padding: at least 1 unit above/below, or 20% of range
            const padding = Math.max(1, range * 0.25);
            const yMin = Math.floor((dataMin - padding) * 2) / 2; // round to 0.5
            const yMax = Math.ceil((dataMax + padding) * 2) / 2;
            const yRange = yMax - yMin || 1;

            const W = 440;
            const H = 160;
            const padL = 36;
            const padR = 12;
            const padT = 8;
            const padB = 22;
            const chartW = W - padL - padR;
            const chartH = H - padT - padB;

            function xPos(i) {
                if (values.length === 1) return padL + chartW / 2;
                return padL + (i / (values.length - 1)) * chartW;
            }
            function yPos(v) {
                return padT + (1 - (v - yMin) / yRange) * chartH;
            }

            let svg = '';

            // Y-axis grid lines and labels
            const gridSteps = 4;
            for (let i = 0; i <= gridSteps; i++) {
                const v = yMin + (i / gridSteps) * yRange;
                const y = yPos(v);
                svg += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#222" stroke-width="1"/>`;
                svg += `<text x="${padL - 6}" y="${y + 4}" text-anchor="end" fill="#555" font-size="10" font-family="Inter, sans-serif">${formatNum(v, 1)}</text>`;
            }

            // Average dashed line
            const avgY = yPos(avg);
            svg += `<line x1="${padL}" y1="${avgY}" x2="${W - padR}" y2="${avgY}" stroke="#4baea4" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>`;

            // Area fill
            let areaPath = `M ${xPos(0)} ${yPos(values[0])}`;
            for (let i = 1; i < values.length; i++) {
                areaPath += ` L ${xPos(i)} ${yPos(values[i])}`;
            }
            areaPath += ` L ${xPos(values.length - 1)} ${padT + chartH} L ${xPos(0)} ${padT + chartH} Z`;
            svg += `<path d="${areaPath}" fill="url(#areaGrad)" opacity="0.3"/>`;

            // Line
            let linePath = `M ${xPos(0)} ${yPos(values[0])}`;
            for (let i = 1; i < values.length; i++) {
                linePath += ` L ${xPos(i)} ${yPos(values[i])}`;
            }
            svg += `<path d="${linePath}" fill="none" stroke="#4baea4" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

            // Dots (visible + larger invisible hit area)
            values.forEach((v, i) => {
                svg += `<circle cx="${xPos(i)}" cy="${yPos(v)}" r="16" fill="transparent" class="chart-dot-hit" data-index="${i}" style="cursor:pointer"/>`;
                svg += `<circle cx="${xPos(i)}" cy="${yPos(v)}" r="3.5" fill="#4baea4" stroke="#151515" stroke-width="2" pointer-events="none" class="chart-dot-visible" data-index="${i}"/>`;
            });

            // X-axis date labels (show a few, not all)
            const maxLabels = 5;
            const step = Math.max(1, Math.floor(entries.length / maxLabels));
            for (let i = 0; i < entries.length; i += step) {
                const d = new Date(entries[i].date);
                const label = `${d.getDate()}/${d.getMonth() + 1}`;
                svg += `<text x="${xPos(i)}" y="${H - 2}" text-anchor="middle" fill="#444" font-size="9" font-family="Inter, sans-serif">${label}</text>`;
            }
            // Always show last label if not already shown
            if ((entries.length - 1) % step !== 0) {
                const d = new Date(entries[entries.length - 1].date);
                const label = `${d.getDate()}/${d.getMonth() + 1}`;
                svg += `<text x="${xPos(entries.length - 1)}" y="${H - 2}" text-anchor="middle" fill="#444" font-size="9" font-family="Inter, sans-serif">${label}</text>`;
            }

            chartSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            chartSvg.innerHTML = `
                <defs>
                    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#4baea4" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="#4baea4" stop-opacity="0"/>
                    </linearGradient>
                    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feFlood flood-color="#4baea4" flood-opacity="0.6" result="color"/>
                        <feComposite in="color" in2="blur" operator="in" result="glow"/>
                        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                ${svg}
            `;

            // Tooltip events on dot hit areas
            chartSvg.querySelectorAll('.chart-dot-hit').forEach(dot => {
                function showTip(e) {
                    e.stopPropagation();
                    const idx = parseInt(dot.dataset.index);
                    const entry = chartEntries[idx];
                    if (!entry) return;

                    // Highlight active dot
                    chartSvg.querySelectorAll('.chart-dot-visible').forEach(d => {
                        d.setAttribute('r', '3.5');
                        d.removeAttribute('filter');
                    });
                    const visDot = chartSvg.querySelector(`.chart-dot-visible[data-index="${idx}"]`);
                    if (visDot) {
                        visDot.setAttribute('r', '6');
                        visDot.setAttribute('filter', 'url(#dotGlow)');
                    }

                    let html = `<div class="tt-consumption">${formatNum(entry.consumption, 1)} l/100km</div>`;
                    html += `<div class="tt-details">${formatNum(entry.liters)}L &middot; ${formatNum(entry.distance)}km</div>`;
                    if (entry.note) html += `<div class="tt-note">${entry.note}</div>`;
                    html += `<div class="tt-date">${formatDate(entry.date)}</div>`;
                    chartTooltip.innerHTML = html;
                    chartTooltip.classList.add('visible');

                    // Position relative to chart container
                    const containerRect = chartContainer.getBoundingClientRect();
                    const svgRect = chartSvg.getBoundingClientRect();
                    const scaleX = svgRect.width / W;
                    const scaleY = svgRect.height / H;
                    const cx = parseFloat(dot.getAttribute('cx')) * scaleX;
                    const cy = parseFloat(dot.getAttribute('cy')) * scaleY;

                    const tipW = chartTooltip.offsetWidth;
                    const tipH = chartTooltip.offsetHeight;

                    let left = cx - tipW / 2;
                    // Clamp to container bounds
                    if (left < 4) left = 4;
                    if (left + tipW > containerRect.width - 4) left = containerRect.width - tipW - 4;

                    let top = cy - tipH - 12;
                    if (top < 0) top = cy + 16;

                    chartTooltip.style.left = left + 'px';
                    chartTooltip.style.top = top + 'px';
                }

                dot.addEventListener('mouseenter', showTip);
                dot.addEventListener('touchstart', showTip, { passive: true });
            });

            function clearHighlight() {
                chartTooltip.classList.remove('visible');
                chartSvg.querySelectorAll('.chart-dot-visible').forEach(d => {
                    d.setAttribute('r', '3.5');
                    d.removeAttribute('filter');
                });
            }

            chartSvg.addEventListener('mouseleave', clearHighlight);
        }

        // Dismiss tooltip on tap outside chart
        document.addEventListener('touchstart', (e) => {
            if (!chartContainer.contains(e.target)) {
                chartTooltip.classList.remove('visible');
                chartSvg.querySelectorAll('.chart-dot-visible').forEach(d => {
                    d.setAttribute('r', '3.5');
                    d.removeAttribute('filter');
                });
            }
        }, { passive: true });

        function renderHistory() {
            const entries = loadEntries();

            if (entries.length === 0) {
                historySection.style.display = 'none';
                dataActionsEmpty.style.display = 'flex';
                return;
            }

            dataActionsEmpty.style.display = 'none';
            historySection.style.display = 'block';
            historyCount.textContent = `${entries.length} fill-up${entries.length !== 1 ? 's' : ''}`;

            // Chart
            renderChart(entries);

            // If only 1 entry and chart is hidden, show avg inline
            if (entries.length === 1) {
                const avg = entries[0].consumption;
                chartAvg.innerHTML = `avg ${formatNum(avg, 1)} <span class="unit">l/100km</span>`;
            }

            // Render entries (newest first)
            historyList.innerHTML = '';
            const sorted = [...entries].reverse();

            sorted.forEach((entry) => {
                const el = document.createElement('div');
                el.className = 'entry';
                const noteHtml = entry.note ? `<div class="entry-note">${entry.note}</div>` : '';
                el.innerHTML = `
                    <div class="entry-left">
                        <div class="entry-main">
                            <span class="entry-consumption">${formatNum(entry.consumption, 1)} <span class="unit">l/100km</span></span>
                            <span class="entry-details">
                                <span>${formatNum(entry.liters)}L</span>
                                <span>${formatNum(entry.distance)}km</span>
                            </span>
                        </div>
                        ${noteHtml}
                    </div>
                    <span class="entry-date">${formatDate(entry.date)}</span>
                    <button class="entry-delete" data-id="${entry.id}" title="Delete">&times;</button>
                `;
                historyList.appendChild(el);
            });
        }

        function addEntry() {
            const l = parseFloat(litersInput.value);
            const d = parseFloat(distanceInput.value);
            if (!(l > 0 && d > 0)) return;

            const c = calcConsumption(l, d);
            const note = noteInput.value.trim();
            const entries = loadEntries();
            const entry = {
                id: Date.now(),
                liters: l,
                distance: d,
                consumption: c,
                date: new Date().toISOString()
            };
            if (note) entry.note = note;
            entries.push(entry);
            saveEntries(entries);

            litersInput.value = '';
            distanceInput.value = '';
            noteInput.value = '';
            consumptionEl.innerHTML = '&mdash;';
            submitBtn.disabled = true;
            litersInput.focus();

            renderHistory();
        }

        async function deleteEntry(id) {
            const confirmed = await showModal(
                'Delete fill-up',
                'Are you sure you want to delete this fill-up record?'
            );
            if (!confirmed) return;
            let entries = loadEntries();
            entries = entries.filter(e => e.id !== id);
            saveEntries(entries);
            renderHistory();
        }

        async function clearAll() {
            const confirmed = await showModal(
                'Clear all data',
                'This will delete all your fill-up records. This cannot be undone.'
            );
            if (!confirmed) return;
            saveEntries([]);
            renderHistory();
        }

        // Events
        litersInput.addEventListener('input', updateCalc);
        distanceInput.addEventListener('input', updateCalc);

        submitBtn.addEventListener('click', addEntry);

        [litersInput, distanceInput, noteInput].forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !submitBtn.disabled) {
                    e.preventDefault();
                    addEntry();
                }
            });
        });

        historyList.addEventListener('click', (e) => {
            const btn = e.target.closest('.entry-delete');
            if (btn) {
                const id = parseInt(btn.dataset.id);
                deleteEntry(id);
            }
        });

        clearAllBtn.addEventListener('click', clearAll);

        // Export
        exportBtn.addEventListener('click', () => {
            const entries = loadEntries();
            const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'gas-log.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Import
        importBtnFull.addEventListener('click', () => importFile.click());
        importBtnEmpty.addEventListener('click', () => importFile.click());
        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!Array.isArray(data)) throw new Error('Not an array');
                    // Validate entries
                    for (const entry of data) {
                        if (typeof entry.liters !== 'number' || typeof entry.distance !== 'number') {
                            throw new Error('Invalid entry: missing liters or distance');
                        }
                    }
                    // Normalize: ensure id, date, consumption exist
                    function parseDate(d) {
                        if (!d) return new Date().toISOString();
                        const parsed = new Date(/^\d{4}-\d{2}-\d{2}$/.test(d) ? d + 'T12:00:00' : d);
                        return isNaN(parsed) ? new Date().toISOString() : parsed.toISOString();
                    }
                    const normalized = data.map((entry, i) => ({
                        id: entry.id || Date.now() + i,
                        liters: entry.liters,
                        distance: entry.distance,
                        consumption: entry.consumption || calcConsumption(entry.liters, entry.distance),
                        date: parseDate(entry.date),
                        ...(entry.note ? { note: entry.note } : {})
                    }));
                    const existing = loadEntries();
                    if (existing.length > 0) {
                        const merge = await showModal(
                            'Import data',
                            `Found ${normalized.length} entries. You have ${existing.length} existing entries. Import will merge both. Continue?`
                        );
                        if (!merge) return;
                    }
                    // Merge and deduplicate by id
                    const merged = [...existing, ...normalized];
                    const seen = new Set();
                    const deduped = merged.filter(e => {
                        if (seen.has(e.id)) return false;
                        seen.add(e.id);
                        return true;
                    });
                    // Sort by date
                    deduped.sort((a, b) => new Date(a.date) - new Date(b.date));
                    saveEntries(deduped);
                    renderHistory();
                } catch (err) {
                    await showModal('Import failed', err.message);
                }
            };
            reader.readAsText(file);
            importFile.value = '';
        });

        // Init
        renderHistory();
    </script>
</body>
</html>

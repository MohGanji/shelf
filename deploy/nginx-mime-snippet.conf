# Snippet for self-hosted nginx (set root to your deploy path, e.g. /var/www/ganji.me).
# Merge these location blocks into the server { } block for this site.

# Extensionless api-catalog must not fall through as application/octet-stream
location = /.well-known/api-catalog {
    default_type application/linkset+json;
    charset utf-8;
}

location = /robots.txt {
    default_type text/plain;
    charset utf-8;
}

location = /.well-known/agent-skills/index.json {
    default_type application/json;
    charset utf-8;
}
